<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPF Contribution Ledger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="capture">
        <header>
            <h1 class="main-title">Contribution Ledger</h1>
        </header>
        
        <div class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <label>Employee Name</label>
                    <input type="text" id="empName" placeholder="Enter Full Name">
                </div>
                <div class="input-group">
                    <label>UAN Number</label>
                    <input type="text" id="uan" placeholder="12-digit UAN" maxlength="12">
                </div>
            </div>
            
            <div class="actions">
                <button onclick="addRow()" class="btn add-row">➕ Add New Row</button>
                <button onclick="downloadPDF()" class="btn btn-pdf">📄 Export PDF (Landscape)</button>
                <button onclick="downloadJPG()" class="btn btn-jpg">🖼️ Save as JPG</button>
            </div>
            
            <table id="epfTable">
                <thead>
                    <tr>
                        <th>S.No.</th>
                        <th>Establishment Name</th>
                        <th>PF A/c No.</th>
                        <th>Employee Share (₹)</th>
                        <th>Employer Share (₹)</th>
                        <th>Pension Contribution (₹)</th>
                        <th>Total (₹)</th>
                        <th>Remark</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            
            <div class="totals">
                <div class="total-card">
                    <h3>Employee Share</h3>
                    <p id="totalEmp">₹0.00</p>
                </div>
                <div class="total-card">
                    <h3>Employer Share</h3>
                    <p id="totalEmpr">₹0.00</p>
                </div>
                <div class="total-card">
                    <h3>Pension Contribution</h3>
                    <p id="totalPension">₹0.00</p>
                </div>
                <div class="total-card grand-total">
                    <h3>GRAND TOTAL</h3>
                    <p id="grandTotal">₹0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
